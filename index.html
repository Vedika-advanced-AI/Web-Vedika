<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CODE VED | Engineered by Divy Patel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="mobileOverlay" class="mobile-overlay"></div>

    <aside id="sidebar" class="sidebar collapsed">
        <div class="sidebar-header">
            <div class="sidebar-logo">CODE VED</div>
            <button id="closeSidebar" class="btn-icon">✕</button>
        </div>
        <button id="btnNewChat" class="btn-new-chat">⊕ New Chat</button>
        <div id="chatHistory" class="sidebar-history"></div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div id="uAv" class="avatar">G</div>
                <div class="user-details">
                    <div id="uName" class="name">Guest Mode</div>
                    <div id="uSub" class="sub">Queries: 0/10</div>
                </div>
            </div>
            <button id="btnLoginRegister" class="btn-login">Login</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="mobile-header">
            <button id="openSidebar" class="btn-icon">☰</button>
        </header>

        <div id="welcomeScreen" class="welcome-container">
            <div class="logo-wrapper">
                <img src="logo.png" alt="CODE VED" class="main-logo">
            </div>
            <h1 id="welcomeTitle" class="welcome-title">Hi, How can I help You?</h1>
        </div>

        <div id="chatMessages" class="chat-thread-container hidden"></div>

        <div class="input-dock">
            <div id="filePreviewBar" class="file-preview-bar"></div>
            
            <div class="input-container">
                <textarea id="mainInput" class="chat-input" placeholder="Ask anything..." rows="1"></textarea>
                <div class="prompt-actions">
                    <button id="btnTools" class="tool-dropdown-btn">Tools ⌄</button>
                    <button id="btnMic" class="btn-action-icon">Mic</button>
                    <button id="btnSend" class="btn-send-primary">Send</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
