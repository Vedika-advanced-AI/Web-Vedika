    <!-- Main Application JavaScript -->
    <script>
        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const btnMenu = document.getElementById('btnMenu');
        const mobileOverlay = document.getElementById('mobileOverlay');
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const welcomeCenter = document.getElementById('welcomeCenter');
        const chatInput = document.getElementById('chatInput');
        const btnSend = document.getElementById('btnSend');
        const btnStop = document.getElementById('btnStop');
        const btnScrollBottom = document.getElementById('btnScrollBottom');
        const fileInput = document.getElementById('fileInput');
        const btnUpload = document.getElementById('btnUpload');
        const filePreviewBar = document.getElementById('filePreviewBar');
        const sidebarHistory = document.getElementById('sidebarHistory');
        const btnNewChat = document.getElementById('btnNewChat');
        const btnClearAll = document.getElementById('btnClearAll');
        const btnLoginRegister = document.getElementById('btnLoginRegister');
        const authOverlay = document.getElementById('authOverlay');
        const authClose = document.getElementById('authClose');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmMsg = document.getElementById('confirmMsg');
        const confirmCancel = document.getElementById('confirmCancel');
        const confirmOk = document.getElementById('confirmOk');

        // State
        let isGenerating = false;
        let conversationHistory = [];
        let attachedFiles = [];
        let currentMessageElement = null;
        let userLocation = null;

        // Initialize
        function init() {
            bindEvents();
            loadHistory();
            checkMobile();
            autoResizeTextarea();
        }

        // Bind Events
        function bindEvents() {
            // Sidebar Toggle
            btnMenu.addEventListener('click', toggleSidebar);
            mobileOverlay.addEventListener('click', closeSidebar);

            // Chat Input
            chatInput.addEventListener('input', autoResizeTextarea);
            chatInput.addEventListener('keydown', handleKeyDown);
            btnSend.addEventListener('click', sendMessage);
            btnStop.addEventListener('click', stopGenerating);

            // File Upload
            btnUpload.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileUpload);

            // New Chat & Clear
            btnNewChat.addEventListener('click', startNewChat);
            btnClearAll.addEventListener('click', () => showConfirm('Clear all history?', clearAllHistory));

            // Auth Modal
            btnLoginRegister.addEventListener('click', () => authOverlay.classList.add('active'));
            authClose.addEventListener('click', () => authOverlay.classList.remove('active'));
            authOverlay.addEventListener('click', (e) => {
                if (e.target === authOverlay) authOverlay.classList.remove('active');
            });

            // Confirm Box
            confirmCancel.addEventListener('click', () => confirmOverlay.classList.remove('active'));
            confirmOk.addEventListener('click', () => {
                confirmOverlay.classList.remove('active');
                if (confirmOk.onclick) confirmOk.onclick();
            });

            // Scroll to Bottom
            btnScrollBottom.addEventListener('click', scrollToBottom);

            // Chat Container Scroll
            chatContainer.addEventListener('scroll', handleScroll);

            // Window Resize
            window.addEventListener('resize', checkMobile);
        }

        // Toggle Sidebar
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            mobileOverlay.classList.toggle('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('active');
            mobileOverlay.classList.remove('active');
        }

        // Check Mobile
        function checkMobile() {
            if (window.innerWidth <= 900) {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
        }

        // Auto Resize Textarea
        function autoResizeTextarea() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 180) + 'px';
        }

        // Handle Key Down
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!e.repeat) sendMessage();
            }
        }

        // Send Message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message && attachedFiles.length === 0) return;

            if (isGenerating) {
                stopGenerating();
                return;
            }

            // Hide welcome center
            welcomeCenter.style.display = 'none';

            // Add user message to UI
            addMessageToUI('user', message, attachedFiles);

            // Clear input
            chatInput.value = '';
            attachedFiles = [];
            filePreviewBar.classList.remove('active');
            fileInput.value = '';
            autoResizeTextarea();

            // Add to history
            conversationHistory.push({
                role: 'user',
                content: message
            });

            // Show typing indicator
            const typingIndicator = createTypingIndicator();
            chatMessages.appendChild(typingIndicator);
            scrollToBottom();

            // Prepare request data
            const requestData = {
                message: message,
                history: conversationHistory,
                attachments: attachedFiles.map(f => ({
                    type: f.type,
                    data: f.data
                }))
            };

            // Add location if available
            if (userLocation) {
                requestData.location = userLocation;
            }

            // Set generating state
            isGenerating = true;
            btnSend.style.display = 'none';
            btnStop.style.display = 'flex';

            try {
                // Send to API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                // Remove typing indicator
                chatMessages.removeChild(typingIndicator);

                // Handle streaming response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let botMessage = '';

                // Create bot message element
                const botMessageElement = createMessageElement('bot', '');
                chatMessages.appendChild(botMessageElement);
                currentMessageElement = botMessageElement.querySelector('.bot-content');

                // Process stream
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim());

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.choices && data.choices[0] && data.choices[0].delta) {
                                    const content = data.choices[0].delta.content || '';
                                    botMessage += content;
                                    currentMessageElement.innerHTML = formatMessage(botMessage);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error('Error parsing stream:', e);
                            }
                        }
                    }
                }

                // Add to history
                conversationHistory.push({
                    role: 'assistant',
                    content: botMessage
                });

                // Save to local storage
                saveHistory();

            } catch (error) {
                console.error('Error:', error);
                chatMessages.removeChild(typingIndicator);
                addMessageToUI('bot', 'Sorry, I encountered an error. Please try again.');
            } finally {
                isGenerating = false;
                btnSend.style.display = 'flex';
                btnStop.style.display = 'none';
                currentMessageElement = null;
            }
        }

        // Stop Generating
        function stopGenerating() {
            if (!isGenerating) return;
            isGenerating = false;
            btnSend.style.display = 'flex';
            btnStop.style.display = 'none';
            currentMessageElement = null;
        }

        // Add Message to UI
        function addMessageToUI(role, content, files = []) {
            const messageElement = createMessageElement(role, content, files);
            chatMessages.appendChild(messageElement);
            scrollToBottom();
        }

        // Create Message Element
        function createMessageElement(role, content, files = []) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            if (role === 'user') {
                wrapper.innerHTML = `
                    <div class="user-message">
                        ${formatMessage(content)}
                        ${files.length > 0 ? createAttachmentsHTML(files) : ''}
                    </div>
                    <div class="msg-actions">
                        <button class="action-btn" onclick="copyMessage(this)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="bot-message">
                        <div class="bot-avatar">
                            <img src="https://via.placeholder.com/40x40/00d4ff/ffffff?text=CV" alt="CODE VED">
                        </div>
                        <div class="bot-content-wrapper">
                            <div class="bot-content">
                                ${formatMessage(content)}
                                ${files.length > 0 ? createAttachmentsHTML(files) : ''}
                            </div>
                        </div>
                    </div>
                    <div class="msg-actions">
                        <button class="action-btn" onclick="copyMessage(this)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            Copy
                        </button>
                        <button class="action-btn" onclick="regenerateResponse(this)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6M1 20v-6h6"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                            Regenerate
                        </button>
                    </div>
                `;
            }

            return wrapper;
        }

        // Create Typing Indicator
        function createTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            wrapper.innerHTML = `
                <div class="bot-message">
                    <div class="bot-avatar">
                        <img src="https://via.placeholder.com/40x40/00d4ff/ffffff?text=CV" alt="CODE VED">
                    </div>
                    <div class="bot-content-wrapper">
                        <div class="bot-content">
                            <div class="typing-indicator">
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            return wrapper;
        }

        // Create Attachments HTML
        function createAttachmentsHTML(files) {
            let html = '<div class="chat-attachment-container">';
            files.forEach(file => {
                if (file.type === 'image') {
                    html += `<img src="${file.data}" class="chat-img-preview" alt="Attachment">`;
                } else {
                    html += `<div class="chat-file-pill">${file.name}</div>`;
                }
            });
            html += '</div>';
            return html;
        }

        // Handle File Upload
        function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    attachedFiles.push({
                        name: file.name,
                        type: file.type.startsWith('image/') ? 'image' : 'file',
                        data: event.target.result
                    });
                    updateFilePreview();
                };
                reader.readAsDataURL(file);
            });

            e.target.value = '';
        }

        // Update File Preview
        function updateFilePreview() {
            if (attachedFiles.length === 0) {
                filePreviewBar.classList.remove('active');
                return;
            }

            filePreviewBar.classList.add('active');
            filePreviewBar.innerHTML = attachedFiles.map((file, index) => `
                <div class="file-preview-pill">
                    ${file.type === 'image' ? `<img src="${file.data}" class="file-preview-icon" alt="">` : `
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    `}
                    <span class="file-preview-name">${file.name}</span>
                    <button class="btn-remove-file" onclick="removeFile(${index})">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        // Format Message (Markdown, Code, etc.)
        function formatMessage(text) {
            if (!text) return '';

            // Escape HTML
            let formatted = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Code blocks
            formatted = formatted.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
                const language = lang || 'text';
                return `<pre><code class="language-${language}">${code.trim()}</code></pre>`;
            });

            // Inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Italic
            formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');

            return formatted;
        }

        // Scroll to Bottom
        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Handle Scroll
        function handleScroll() {
            const isAtBottom = chatContainer.scrollHeight - chatContainer.clientHeight <= chatContainer.scrollTop + 100;
            btnScrollBottom.classList.toggle('visible', !isAtBottom);
        }

        // Start New Chat
        function startNewChat() {
            conversationHistory = [];
            chatMessages.innerHTML = '';
            welcomeCenter.style.display = 'flex';
            saveHistory();
            scrollToBottom();
        }

        // Clear All History
        function clearAllHistory() {
            localStorage.removeItem('codeVedHistory');
            startNewChat();
        }

        // Show Confirm
        function showConfirm(message, onConfirm) {
            confirmMsg.textContent = message;
            confirmOk.onclick = onConfirm;
            confirmOverlay.classList.add('active');
        }

        // Save History
        function saveHistory() {
            localStorage.setItem('codeVedHistory', JSON.stringify(conversationHistory));
        }

        // Load History
        function loadHistory() {
            const saved = localStorage.getItem('codeVedHistory');
            if (saved) {
                try {
                    conversationHistory = JSON.parse(saved);
                } catch (e) {
                    conversationHistory = [];
                }
            }
        }

        // Copy Message
        function copyMessage(button) {
            const messageElement = button.closest('.message-wrapper');
            const content = messageElement.querySelector('.user-message, .bot-content');
            if (content) {
                navigator.clipboard.writeText(content.textContent || content.innerText);
                // Show feedback
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            }
        }

        // Regenerate Response
        function regenerateResponse(button) {
            // Implementation for regeneration
            console.log('Regenerate clicked');
        }

        // Remove File
        function removeFile(index) {
            attachedFiles.splice(index, 1);
            updateFilePreview();
        }

        // Utility Functions
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Initialize on DOM Load
        document.addEventListener('DOMContentLoaded', init);
    </script>

    <!-- Global Functions for HTML onclick -->
    <script>
        // Expose functions to global scope for HTML onclick handlers
        window.copyMessage = function(button) {
            const messageElement = button.closest('.message-wrapper');
            const content = messageElement.querySelector('.user-message, .bot-content');
            if (content) {
                navigator.clipboard.writeText(content.textContent || content.innerText);
                const originalText = button.innerHTML;
                button.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
                setTimeout(() => {
                    button.innerHTML = originalText;
                }, 2000);
            }
        };

        window.regenerateResponse = function(button) {
            console.log('Regenerate response');
        };

        window.removeFile = function(index) {
            const filePreviewBar = document.getElementById('filePreviewBar');
            const pills = filePreviewBar.querySelectorAll('.file-preview-pill');
            if (pills[index]) {
                pills[index].remove();
                if (filePreviewBar.querySelectorAll('.file-preview-pill').length === 0) {
                    filePreviewBar.classList.remove('active');
                }
            }
        };
    </script>
</body>
</html>
