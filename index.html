            /**
             * स्पीच टू टेक्स्ट (Voice Typing)
             * यह ब्राउज़र की बिल्ट-इन स्पीच API का उपयोग करता है।
             */
            const Speech = { 
                rec: null, 
                isRec: false, 
                
                init() { 
                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
                    if (SR === undefined) {
                        return;
                    }
                    
                    this.rec = new SR(); 
                    this.rec.interimResults = true; 
                    
                    this.rec.onstart = () => { 
                        this.isRec = true; 
                        const micBtn = document.getElementById('btnStt');
                        micBtn.style.color = 'red'; 
                    }; 
                    
                    this.rec.onresult = (e) => { 
                        let trans = ''; 
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            if (e.results[i].isFinal && e.results[i][0]) {
                                trans += e.results[i][0].transcript;
                            }
                        }
                        
                        if (trans !== '') { 
                            const inp = document.getElementById('mainInput'); 
                            
                            if (inp.value !== '') {
                                inp.value += ' ' + trans;
                            } else {
                                inp.value += trans;
                            }
                            
                            UI.autoGrow(inp); 
                            
                            // वॉइस टाइपिंग के समय भी ग्लो इफ़ेक्ट ऑन करें
                            glowWrapper.classList.add('active'); 
                        } 
                    }; 
                    
                    this.rec.onerror = () => {
                        this.stop();
                    };
                    
                    this.rec.onend = () => {
                        this.stop();
                    };
                }, 
                
                toggle() { 
                    if (this.rec === null) {
                        this.init(); 
                    }
                    
                    if (this.isRec === true) {
                        this.stop(); 
                    } else { 
                        try { 
                            this.rec.start(); 
                        } catch(e) {
                            console.error("Speech start error:", e);
                        } 
                    } 
                }, 
                
                stop() { 
                    if (this.rec !== null) {
                        this.rec.stop(); 
                    }
                    this.isRec = false; 
                    
                    const micBtn = document.getElementById('btnStt');
                    micBtn.style.color = ''; 
                } 
            };

            /**
             * मार्कडाउन रेंडरिंग (Marked.js और Highlight.js)
             */
            const renderer = { 
                code(code, lang) { 
                    let language = '';
                    if (lang) {
                        const match = lang.match(/\S*/);
                        if (match) {
                            language = match[0];
                        }
                    }
                    
                    if (language === 'mermaid') {
                        return `<pre class="mermaid">${code}</pre>`; 
                    }
                    
                    if (language !== '' && hljs.getLanguage(language)) { 
                        try { 
                            const highlighted = hljs.highlight(code, { language }).value;
                            return `<pre><code class="hljs ${language}">${highlighted}</code></pre>`; 
                        } catch (__) {
                            // इग्नोर करें
                        } 
                    } 
                    
                    const autoHighlighted = hljs.highlightAuto(code).value;
                    return `<pre><code class="hljs">${autoHighlighted}</code></pre>`; 
                } 
            };
            
            marked.use({ 
                renderer: renderer, 
                gfm: true, 
                breaks: true, 
                pedantic: false 
            });

            /**
             * मेरमेड डायग्राम्स इनिशियलाइज़ेशन
             */
            function initMermaid() { 
                if (typeof mermaid !== 'undefined') {
                    mermaid.initialize({ startOnLoad: false, theme: 'default' }); 
                }
            }
            
            /**
             * कोड कॉपी बटन्स
             */
            function addCodeCopyButtons(container) {
                const preElements = container.querySelectorAll('pre:not(.mermaid)');
                
                preElements.forEach(pre => {
                    const existingBtn = pre.querySelector('.code-copy-btn');
                    if (existingBtn !== null) {
                        return; // अगर पहले से है तो स्किप करें
                    }
                    
                    const codeEl = pre.querySelector('code'); 
                    if (codeEl === null) {
                        return;
                    }
                    
                    const btn = document.createElement('button'); 
                    btn.className = 'code-copy-btn'; 
                    
                    const copySvg = `<svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                    const checkSvg = `<svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                    
                    btn.innerHTML = `${copySvg} <span>Copy</span>`;
                    
                    btn.onclick = (e) => { 
                        e.stopPropagation(); 
                        
                        navigator.clipboard.writeText(codeEl.innerText).then(() => { 
                            btn.innerHTML = `${checkSvg} <span>Copied</span>`; 
                            
                            setTimeout(() => {
                                btn.innerHTML = `${copySvg} <span>Copy</span>`;
                            }, 1500); 
                        }); 
                    };
                    
                    pre.appendChild(btn);
                });
            }

            /**
             * ========================================================
             * MathJax बग फिक्स (सुरक्षित रेंडरिंग)
             * यह सुनिश्चित करता है कि इक्वेशन रेंडरिंग के दौरान कोई क्रैश न हो।
             * ========================================================
             */
            function runRendering(container, isProcessing) {
                // जनरेशन के बीच में भारी रेंडरिंग रोकें ताकि UI धीमा न हो
                if (isProcessing === true) {
                    return;
                }
                
                // सुरक्षित तरीके से MathJax कॉल करें (Promisified)
                if (window.MathJax !== undefined && MathJax.typesetPromise !== undefined) {
                    try {
                        MathJax.typesetClear([container]);
                        MathJax.typesetPromise([container]).then(() => {
                            // रेंडरिंग सफल
                        }).catch(err => {
                            console.warn('MathJax Error in typesetting:', err);
                        });
                    } catch (syncErr) {
                        console.error('MathJax Sync Error:', syncErr);
                    }
                }
                
                // मेरमेड रेंडरिंग
                if (typeof mermaid !== 'undefined') { 
                    const diag = container.querySelectorAll('.mermaid'); 
                    if (diag.length > 0) {
                        mermaid.run({ nodes: diag }).catch((e) => {
                            console.warn("Mermaid execution error", e);
                        }); 
                    }
                }
            }

            /**
             * चैट और कम्युनिकेशन लॉजिक (AI के साथ)
             */
            const Chat = {
                
                // यूज़र का मैसेज स्क्रीन पर दिखाना
                renderUser(txt, attachUI = '') {
                    const container = document.getElementById('chatMessages'); 
                    
                    const wrapper = document.createElement('div'); 
                    wrapper.className = 'message-wrapper';
                    
                    let safeText = '';
                    if (txt) {
                        safeText = UI.escape(txt);
                    }
                    
                    wrapper.innerHTML = `
                        <div class="user-message">
                            ${attachUI}
                            ${safeText}
                        </div>
                    `;
                    
                    container.appendChild(wrapper); 
                    
                    UI.autoScroll = true; 
                    UI.scrollToBottom(true);
                },
                
                // AI का खाली बॉक्स बनाना
                renderBot(msgId) {
                    const container = document.getElementById('chatMessages'); 
                    
                    const wrapper = document.createElement('div'); 
                    wrapper.className = 'message-wrapper';
                    
                    const copySvg = `<svg style="width:14px;height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                    
                    wrapper.innerHTML = `
                        <div class="bot-message">
                            <div class="bot-avatar">
                                <img src="${Config.LOGO}">
                            </div>
                            <div class="bot-content-wrapper">
                                <div class="bot-content" id="bot-content-${msgId}"></div>
                                <div class="msg-actions">
                                    <button class="action-btn" onclick="Chat.copyMsg('${msgId}')">
                                        ${copySvg} Copy
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(wrapper); 
                    UI.scrollToBottom(); 
                    
                    return { 
                        contentDiv: document.getElementById(`bot-content-${msgId}`) 
                    };
                },
                
                // गणित के सूत्रों को पार्सिंग से बचाना
                preprocessMath(text) {
                    let mb = {};
                    let c = 0;
                    
                    function replacer(m) { 
                        const id = `MATHBLK${c}END`; 
                        mb[id] = m; 
                        c++; 
                        return id; 
                    }
                    
                    let processed = text;
                    processed = processed.replace(/\$\$([\s\S]+?)\$\$/g, replacer);
                    processed = processed.replace(/\\\[([\s\S]+?)\\\]/g, replacer);
                    processed = processed.replace(/\$((?:\\.|[^$\\])+?)\$/g, replacer);
                    processed = processed.replace(/\\\(([\s\S]+?)\\\)/g, replacer);
                    
                    return { 
                        text: processed, 
                        mathBlocks: mb 
                    };
                },
                
                // मार्कडाउन के बाद गणित वापस डालना
                postprocessMath(html, mb) { 
                    let processedHtml = html;
                    for (const [id, val] of Object.entries(mb)) {
                        processedHtml = processedHtml.split(id).join(val);
                    }
                    return processedHtml; 
                },
                
                // फाइनल रेंडरिंग (Marked + Math + Think tags)
                parseAndRender(txt, isProc, c) {
                    // थिंकिंग टैग्स को नार्मलाइज़ करना
                    let nt = txt.replace(/<\|channel\|>thought\s*<\|channel\|>/gi, "<think>\n");
                    nt = nt.replace(/<\|channel\|>answer\s*<\|channel\|>/gi, "\n</think>\n");
                    
                    const thinkRegex = /<think>([\s\S]*?)(?:<\/think>|$)/i;
                    const tm = nt.match(thinkRegex); 
                    
                    let html = '';
                    
                    if (tm !== null) { 
                        let openState = '';
                        if (isProc === true) {
                            openState = 'open';
                        }
                        
                        const parsedThink = marked.parse(tm[1].trim());
                        
                        html += `
                            <details class="qwen-think-box" ${openState}>
                                <summary>Thinking Process</summary>
                                <div class="qwen-think-content">${parsedThink}</div>
                            </details>
                        `; 
                    }
                    
                    let mt = nt.replace(thinkRegex, '');
                    mt = mt.trim();
                    
                    if (mt !== '') { 
                        const mathProcess = Chat.preprocessMath(mt);
                        const safeText = mathProcess.text;
                        const mathBlocks = mathProcess.mathBlocks;
                        
                        const markedHtml = marked.parse(safeText);
                        const finalMathHtml = Chat.postprocessMath(markedHtml, mathBlocks);
                        
                        html += `<div class="tex2jax_process">${finalMathHtml}</div>`; 
                    }
                    
                    if (isProc === true) { 
                        html += `<span class="blinking-cursor"></span>`; 
                    }
                    
                    c.innerHTML = html; 
                    
                    addCodeCopyButtons(c); 
                    runRendering(c, isProc);
                },
                
                // मैसेज कॉपी करना
                copyMsg(id) {
                    const el = document.getElementById(`bot-content-${id}`); 
                    const clone = el.cloneNode(true); 
                    
                    const t = clone.querySelector('.qwen-think-box'); 
                    if (t !== null) {
                        t.remove();
                    }
                    
                    const textToCopy = clone.innerText;
                    
                    navigator.clipboard.writeText(textToCopy).then(() => { 
                        const btn = el.parentElement.querySelector('.action-btn'); 
                        const o = btn.innerHTML; 
                        
                        btn.innerHTML = 'Copied!'; 
                        
                        setTimeout(() => {
                            btn.innerHTML = o;
                        }, 1500); 
                    });
                },
                
                // जनरेशन को बीच में रोकना
                stopGeneration() { 
                    if (State.abortController !== null) { 
                        State.abortController.abort(); 
                        State.abortController = null; 
                    } 
                    
                    State.isProcessing = false; 
                    
                    const btnSend = document.getElementById('btnSend');
                    btnSend.disabled = false; 
                    btnSend.style.display = 'flex'; 
                    
                    const btnStop = document.getElementById('btnStop');
                    btnStop.classList.remove('active'); 
                    
                    // जब जनरेशन रुक जाए, तो ग्लो इफ़ेक्ट भी बंद करें (अगर इनपुट खाली है)
                    const inp = document.getElementById('mainInput');
                    if (inp.value.trim() === '') {
                        glowWrapper.classList.remove('active'); 
                    }
                },
                
                // मैसेज भेजना (Main API Logic)
                async handleSend() {
                    // अगर पहले से प्रोसेसिंग हो रही है, तो वापस जाएँ
                    if (State.isProcessing === true) {
                        return;
                    }
                    
                    // गेस्ट लिमिट चेक
                    if (State.user === null && State.guestCount >= 10) { 
                        Auth.openModal(); 
                        UI.showAuthMsg("Guest limit reached. Login to continue.", true);
                        return;
                    }
                    
                    const input = document.getElementById('mainInput'); 
                    const text = input.value.trim();
                    
                    // अगर इनपुट खाली है और कोई फ़ाइल नहीं है, तो कुछ न करें
                    if (text === '' && State.attachment === null) {
                        return;
                    }
                    
                    // गेस्ट काउंट बढ़ाना
                    if (State.user === null) { 
                        State.guestCount = State.guestCount + 1; 
                        localStorage.setItem('codeved_guest', State.guestCount); 
                        document.getElementById('uSub').innerText = `Queries: ${State.guestCount}/10`; 
                    }
                    
                    // स्टेट बदलना
                    State.isProcessing = true; 
                    
                    const btnSend = document.getElementById('btnSend');
                    btnSend.style.display = 'none'; 
                    
                    const btnStop = document.getElementById('btnStop');
                    btnStop.classList.add('active');
                    
                    input.value = ''; 
                    input.style.height = 'auto'; 
                    UI.updateWelcomeScreen();
                    
                    // पेलोड और UI तैयार करना
                    let pStr = text;
                    let aUI = '';
                    let arr = [];
                    
                    if (State.attachment !== null) {
                        if (State.attachment.type === 'text') { 
                            pStr = `[File attached: ${State.attachment.name}]\n\n---DATA---\n${State.attachment.data}\n---END DATA---\n\nUser: ${text}`; 
                            
                            aUI = `
                                <div class="chat-attachment-container">
                                    <div class="chat-file-pill">
                                        ${State.attachment.name}
                                    </div>
                                </div>
                            `; 
                        }
                        else { 
                            arr.push(State.attachment); 
                            
                            aUI = `
                                <div class="chat-attachment-container">
                                    <img src="data:image/jpeg;base64,${State.attachment.data}" class="chat-img-preview">
                                </div>
                            `; 
                        }
                    }
                    
                    // यूज़र मैसेज रेंडर करना
                    Chat.renderUser(text, aUI); 
                    
                    // हिस्ट्री में जोड़ना
                    State.history.push({ 
                        role: 'user', 
                        content: pStr 
                    }); 
                    
                    // फाइल सिस्टम साफ़ करना
                    FileSys.discard();
                    
                    // बॉट का खाली बॉक्स बनाना
                    const msgId = Date.now().toString(); 
                    const botObj = Chat.renderBot(msgId); 
                    Chat.parseAndRender("", true, botObj.contentDiv);
                    
                    // API कॉल के लिए सेटअप
                    State.abortController = new AbortController(); 
                    let full = "";
                    
                    try {
                        const apiPayload = { 
                            message: pStr, 
                            attachments: arr, 
                            is_search: State.searchEnabled, 
                            history: State.history 
                        };
                        
                        const res = await fetch(Config.API_ENDPOINT, { 
                            method: 'POST', 
                            headers: {
                                'Content-Type': 'application/json'
                            }, 
                            body: JSON.stringify(apiPayload), 
                            signal: State.abortController.signal 
                        });
                        
                        if (res.ok === false) {
                            throw new Error(`Server error (${res.status})`);
                        }
                        
                        // स्ट्रीमिंग रेस्पोंस को पढ़ना
                        const reader = res.body.getReader(); 
                        const decoder = new TextDecoder(); 
                        let buf = '';
                        
                        while (true) {
                            const { done, value } = await reader.read(); 
                            
                            if (done === true) {
                                break;
                            }
                            
                            buf += decoder.decode(value, { stream: true }); 
                            
                            const lines = buf.split('\n'); 
                            buf = lines.pop(); // अधूरा डेटा बफर में रखें
                            
                            for (let i = 0; i < lines.length; i++) {
                                let l = lines[i];
                                
                                if (l.startsWith('data: ')) {
                                    const d = l.substring(6).trim(); 
                                    
                                    if (d === '[DONE]') {
                                        continue;
                                    }
                                    
                                    try { 
                                        const j = JSON.parse(d); 
                                        
                                        if (j.error) { 
                                            botObj.contentDiv.innerHTML += `<br><span>⚠️ ${UI.escape(j.error)}</span>`; 
                                            return; 
                                        } 
                                        
                                        if (j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content) {
                                            full += j.choices[0].delta.content;
                                        }
                                    } catch (parseError) {
                                        // पार्शियल स्ट्रीम एरर को इग्नोर करें
                                    }
                                    
                                    // रीयल-टाइम रेंडरिंग
                                    Chat.parseAndRender(full, true, botObj.contentDiv);
                                }
                            }
                        }
                        
                        // फाइनल रेंडरिंग
                        Chat.parseAndRender(full, false, botObj.contentDiv); 
                        
                        // हिस्ट्री में बॉट का जवाब जोड़ना और सेव करना
                        State.history.push({ 
                            role: 'assistant', 
                            content: full 
                        }); 
                        HistoryManager.saveCurrent();
                        
                    } catch (e) {
                        if (e.name === 'AbortError') { 
                            botObj.contentDiv.innerHTML += `<br><span style="color:#a1a1aa; font-style:italic;">⏹ Stopped.</span>`; 
                            if (full.trim() !== '') { 
                                State.history.push({ 
                                    role: 'assistant', 
                                    content: full 
                                }); 
                                HistoryManager.saveCurrent(); 
                            } 
                        } 
                        else {
                            let safeErrorMsg = 'Error.';
                            if (e.message) {
                                safeErrorMsg = UI.escape(e.message);
                            }
                            botObj.contentDiv.innerHTML += `<br><span style="color:red;">⚠️ ${safeErrorMsg}</span>`;
                        }
                    } finally {
                        // प्रोसेस ख़त्म होने पर स्टेट वापस नार्मल करें
                        State.isProcessing = false; 
                        
                        btnSend.disabled = false; 
                        btnSend.style.display = 'flex'; 
                        
                        btnStop.classList.remove('active'); 
                        
                        // अगर इनपुट खाली है तो ग्लो इफ़ेक्ट बंद करें
                        if (document.getElementById('mainInput').value.trim() === '') {
                            glowWrapper.classList.remove('active'); 
                        }
                        
                        if (UI.autoScroll === true) {
                            UI.scrollToBottom();
                        }
                    }
                }
            };

            // ग्लोबल स्कोप में एक्सपोज़ करना (इनलाइन HTML इवेंट्स के लिए)
            window.UI = UI; 
            window.Auth = Auth; 
            window.HistoryManager = HistoryManager; 
            window.SearchManager = SearchManager; 
            window.FileSys = FileSys; 
            window.Speech = Speech; 
            window.Chat = Chat;
            
            // मेरमेड डायग्राम्स
            initMermaid();
            
            // लोगो असाइनमेंट
            document.getElementById('faviconLink').href = Config.LOGO; 
            document.getElementById('welcomeLogoImg').src = Config.LOGO; 
            document.getElementById('sidebarLogoImg').src = Config.LOGO;
            
            // विंडो लोड होने पर इनिशियलाइज़ेशन
            window.onload = () => { 
                Auth.init(); 
                UI.updateWelcomeScreen(); 
                
                // डेस्कटॉप के लिए साइडबार डिफ़ॉल्ट रूप से खुला रखें
                if (window.innerWidth > 900) {
                    document.getElementById('sidebar').classList.remove('collapsed'); 
                }
            };
        })();
    </script>
